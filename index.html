<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Pihu — Pregnancy Journal</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#D4537E" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Pihu" />
<style>
  :root{
    --bg:#FAF7F3; --card:#FFFFFF; --ink:#2E2A25; --muted:#7A736B; --line:#ECE6DE;
    --teal:#1D9E75; --tealbg:#E7F5EF; --pink:#D4537E; --pinkbg:#FBEAF0;
    --purple:#7F77DD; --purplebg:#EEEDFE; --amber:#BA7517; --amberbg:#FAEEDA;
  }
  body.dark{ --bg:#1B1813; --card:#26211C; --ink:#F0EBE3; --muted:#A99F94; --line:#3A332C; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans",Arial,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.5; font-size:16px;}
  .wrap{max-width:480px; margin:0 auto; min-height:100vh; background:var(--bg);}
  header{position:sticky; top:0; z-index:5; background:var(--bg); padding:14px 16px 10px; border-bottom:1px solid var(--line);}
  .brandrow{display:flex; align-items:center; gap:10px;}
  .logo{width:34px; height:34px; border-radius:50%; background:var(--tealbg); display:flex; align-items:center; justify-content:center; font-size:19px; animation:logoSway 5s ease-in-out infinite;}
  .brand h1{font-size:17px; margin:0; font-weight:600;}
  .brand p{font-size:11px; margin:0; color:var(--muted);}
  .langsel{margin-left:auto; display:flex; gap:4px;}
  .langsel button{font-size:12px; padding:5px 9px; border:1px solid var(--line); background:var(--card); border-radius:8px; color:var(--muted); cursor:pointer;}
  .langsel button.on{background:var(--teal); color:#fff; border-color:var(--teal);}
  .names{display:flex; gap:8px; margin-top:10px;}
  .names input{flex:1; min-width:0; padding:9px 11px; border:1px solid var(--line); border-radius:9px; font-size:14px; background:var(--card); color:var(--ink);}
  .progwrap{height:5px; background:var(--line); border-radius:5px; margin-top:11px; overflow:hidden;}
  .progbar{height:100%; width:3%; background:var(--teal); transition:width .3s;}
  main{padding:16px;}
  .dayhead{display:flex; align-items:center; gap:8px; margin-bottom:14px;}
  .dayhead .wk{font-size:17px; font-weight:600;}
  .pill{font-size:11px; background:var(--card); border:1px solid var(--line); color:var(--muted); padding:3px 9px; border-radius:20px;}
  .jumpbtn{cursor:pointer; border-color:var(--teal); color:var(--teal);}
  .moodrow{display:flex; gap:7px; margin-bottom:16px;}
  .mood{flex:1; padding:9px 0; border:1px solid var(--line); border-radius:11px; background:var(--card); text-align:center; cursor:pointer;}
  .mood .e{font-size:21px; line-height:1;}
  .mood .l{font-size:10px; color:var(--muted); margin-top:3px;}
  .mood.sel{border-color:var(--pink); background:var(--pinkbg);}
  .mood.sel .l{color:var(--pink);}
  .card{background:var(--card); border:1px solid var(--line); border-radius:13px; padding:13px 14px; margin-bottom:12px;}
  .chead{display:flex; align-items:center; gap:9px;}
  .chip{width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; flex:none;}
  .chead b{font-size:13px; font-weight:600;}
  .ctext{font-size:14px; color:var(--ink); margin:9px 0 0;}
  .task{cursor:pointer;}
  .check{margin-left:auto; width:24px; height:24px; border-radius:50%; border:2px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:14px; color:#fff;}
  .task.done .check{background:var(--teal); border-color:var(--teal);}
  .task.done .ctext{color:var(--muted); text-decoration:line-through;}
  textarea{width:100%; min-height:64px; margin-top:9px; padding:10px; border:1px solid var(--line); border-radius:10px; font-family:inherit; font-size:14px; resize:vertical; background:var(--card); color:var(--ink);}
  .photos{display:flex; flex-wrap:wrap; gap:8px; margin-top:10px;}
  .thumb{position:relative; width:80px; height:80px; border-radius:10px; overflow:hidden; border:1px solid var(--line);}
  .thumb img{width:100%; height:100%; object-fit:cover; display:block; cursor:zoom-in;}
  .thumb .rm{position:absolute; top:2px; right:2px; width:20px; height:20px; border-radius:50%; background:rgba(0,0,0,.55); color:#fff; border:none; font-size:13px; line-height:20px; cursor:pointer; padding:0;}
  .addphoto{display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; width:80px; height:80px; border:1.5px dashed var(--line); border-radius:10px; color:var(--muted); font-size:10px; cursor:pointer; background:var(--card);}
  .addphoto .e{font-size:20px;}
  .vbtn{padding:10px 16px; border:1px solid var(--line); border-radius:10px; background:var(--card); font-size:14px; cursor:pointer; font-family:inherit; color:var(--ink);}
  .vbtn.rec{color:var(--pink); border-color:var(--pink);}
  .vbtn.del{margin-left:8px; color:var(--muted);}
  .vhint{font-size:11px; color:var(--muted); margin-top:9px;}
  #voiceArea audio{width:100%; margin-bottom:8px; display:block;}
  .board{position:relative; width:100%; height:210px; margin-top:10px; border:1px dashed var(--line); border-radius:12px; background:#FFFDF9; overflow:hidden; touch-action:none;}
  .board canvas{position:absolute; inset:0; width:100%; height:100%;}
  .sticker{position:absolute; font-size:30px; transform:translate(-50%,-50%); cursor:grab; user-select:none; -webkit-user-select:none; touch-action:none; line-height:1; z-index:2;}
  .sticker .sx{position:absolute; top:-9px; right:-13px; width:18px; height:18px; border-radius:50%; background:rgba(0,0,0,.55); color:#fff; border:none; font-size:11px; line-height:18px; cursor:pointer; padding:0;}
  .boardbar{display:flex; align-items:center; gap:8px; margin-top:10px; flex-wrap:wrap;}
  .swatch{width:26px; height:26px; border-radius:50%; border:2px solid #fff; box-shadow:0 0 0 1px var(--line); cursor:pointer;}
  .swatch.sel{box-shadow:0 0 0 2px var(--ink);}
  .rainbow{width:26px; height:26px; border-radius:50%; cursor:pointer; border:2px solid #fff; box-shadow:0 0 0 1px var(--line); background:conic-gradient(red,orange,yellow,lime,cyan,blue,magenta,red);}
  .rainbow.sel{box-shadow:0 0 0 2px var(--ink);}
  .pensep{width:1px; height:24px; background:var(--line); margin:0 2px;}
  .pensize{width:30px; height:30px; border-radius:9px; border:1px solid var(--line); background:var(--card); display:flex; align-items:center; justify-content:center; cursor:pointer;}
  .pensize.sel{border-color:var(--ink);}
  .pensize i{display:block; border-radius:50%; background:var(--ink);}
  .clearbtn{margin-left:auto; padding:7px 13px; border:1px solid var(--line); border-radius:9px; background:var(--card); font-size:12px; cursor:pointer; font-family:inherit; color:var(--ink);}
  .stickbtn{margin-top:10px; padding:9px 14px; border:1px solid var(--line); border-radius:10px; background:var(--card); font-size:13px; cursor:pointer; font-family:inherit; color:var(--ink);}
  .catlabel{font-size:12px; color:var(--muted); font-weight:600; margin:8px 0 8px;}
  .stickgrid{display:flex; flex-wrap:wrap; gap:7px; margin-bottom:8px;}
  .stickgrid .sopt{font-size:24px; cursor:pointer; padding:5px 8px; border:1px solid var(--line); border-radius:9px; background:var(--bg);}
  nav{display:flex; align-items:center; gap:10px; padding:12px 16px; position:sticky; bottom:0; background:var(--bg); border-top:1px solid var(--line);}
  nav button.navb{flex:none; width:44px; height:44px; border-radius:11px; border:1px solid var(--line); background:var(--card); font-size:19px; cursor:pointer; color:var(--ink);}
  nav button.navb:disabled{opacity:.35;}
  .dots{flex:1; display:flex; gap:5px; justify-content:center; flex-wrap:wrap;}
  .dot{width:7px; height:7px; border-radius:50%; background:var(--line);}
  .dot.on{background:var(--teal); width:16px; border-radius:4px;}
  .tools{display:flex; gap:8px; padding:0 16px 26px;}
  .tools button{flex:1; padding:11px 6px; border:1px solid var(--line); border-radius:11px; background:var(--card); font-size:12px; cursor:pointer; color:var(--ink); font-family:inherit;}
  .tools .primary{background:var(--teal); color:#fff; border-color:var(--teal);}
  .hint{font-size:11px; color:var(--muted); text-align:center; padding:0 16px 10px;}
  .credit{font-size:11px; text-align:center; padding:0 16px 26px; color:var(--muted);}
  .credit a{color:inherit; text-decoration:underline;}
  .cv-credit{font-size:11px; text-align:center; color:#9A6680; margin-top:18px;}
  .cv-credit a{color:inherit; text-decoration:underline;}
  .overlay{position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; z-index:50; align-items:flex-end; justify-content:center;}
  .overlay.open{display:flex;}
  .sheet{background:var(--card); border-radius:18px 18px 0 0; max-width:480px; width:100%; max-height:78vh; overflow:auto; padding:18px 16px 26px;}
  .sheet h3{margin:0 0 14px; font-size:16px;}
  .wkgrp{margin-bottom:16px;}
  .wkgrp .wl{font-size:12px; color:var(--muted); margin-bottom:8px; font-weight:600;}
  .daychips{display:flex; flex-wrap:wrap; gap:8px;}
  .daychip{padding:9px 13px; border:1px solid var(--line); border-radius:10px; background:var(--bg); font-size:13px; cursor:pointer;}
  .daychip.cur{background:var(--teal); color:#fff; border-color:var(--teal);}
  .sheetclose{display:block; width:100%; margin-top:6px; padding:12px; border:1px solid var(--line); border-radius:11px; background:var(--card); font-size:14px; cursor:pointer; font-family:inherit; color:var(--ink);}
  .lightbox{position:fixed; inset:0; background:rgba(0,0,0,.9); display:none; z-index:60; align-items:center; justify-content:center;}
  .lightbox.open{display:flex;}
  .lightbox img{max-width:94%; max-height:84%; border-radius:10px;}
  .lbclose{position:absolute; top:16px; right:18px; width:44px; height:44px; border-radius:50%; background:rgba(255,255,255,.18); color:#fff; border:none; font-size:24px; cursor:pointer;}
  #cover{display:none; flex-direction:column; align-items:center; min-height:100vh; padding:24px 22px 132px; background:linear-gradient(160deg,#FCE9F1 0%,#F4ECFB 48%,#E9F6F1 100%); position:relative; overflow:auto; isolation:isolate;}
  .cv-deco{position:absolute; font-size:22px; opacity:.55; pointer-events:none; animation:floatA 6s ease-in-out infinite;}
  .cv-scene{position:absolute; left:0; bottom:6px; z-index:-1; opacity:.9; pointer-events:none;}
  .sway{transform-box:fill-box; transform-origin:0% 100%; animation:swayA 7s ease-in-out infinite;}
  .bird{transform-box:fill-box; transform-origin:center; animation:bobA 2.6s ease-in-out infinite;}
  .note{opacity:0;}
  .n1{animation:chirpA 3.2s ease-in-out infinite;}
  .n2{animation:chirpA 3.2s ease-in-out .7s infinite;}
  @keyframes swayA{0%,100%{transform:rotate(-1.4deg);}50%{transform:rotate(1.4deg);}}
  @keyframes bobA{0%,100%{transform:translateY(0);}50%{transform:translateY(-2px);}}
  @keyframes chirpA{0%{opacity:0; transform:translate(0,0);}15%{opacity:.95;}100%{opacity:0; transform:translate(7px,-18px);}}
  @keyframes floatA{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
  @keyframes logoSway{0%,100%{transform:rotate(-4deg);}50%{transform:rotate(4deg);}}
  @media (prefers-reduced-motion: reduce){ .sway,.bird,.n1,.n2,.cv-deco,.logo{animation:none !important;} }
  #cv-lang{position:absolute; top:14px; right:14px; display:flex; gap:5px; z-index:2;}
  #cv-lang button{font-size:12px; padding:5px 9px; border:1px solid rgba(0,0,0,.10); background:rgba(255,255,255,.75); border-radius:8px; color:#7A736B; cursor:pointer; font-family:inherit;}
  #cv-lang button.on{background:#2E2A25; color:#fff; border-color:#2E2A25;}
  .cv-title{font-family:"Snell Roundhand","Segoe Script","Bradley Hand",cursive; font-size:40px; line-height:1.12; text-align:center; color:#B83C66; margin:40px 0 4px; font-weight:600;}
  .cv-photo{width:140px; height:140px; border-radius:50%; background:#fff center/cover no-repeat; border:3px dashed #E29ABA; margin:16px 0 6px; position:relative; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 6px 18px rgba(184,60,102,.16);}
  .cv-photo.has{border-style:solid; border-color:#D4537E;}
  .cv-plus{font-size:36px; color:#E29ABA;}
  .cv-rm{position:absolute; top:4px; right:4px; width:26px; height:26px; border-radius:50%; background:rgba(0,0,0,.5); color:#fff; border:none; font-size:13px; line-height:26px; padding:0; cursor:pointer;}
  .cv-addcap{font-size:12px; color:#9A6680; margin-bottom:16px; text-align:center;}
  .cv-msg{background:#fff; border-radius:16px; padding:16px 18px; font-size:15px; line-height:1.6; color:#5A4A52; box-shadow:0 6px 18px rgba(0,0,0,.06); max-width:420px; width:100%; margin-bottom:20px;}
  .cv-q{width:100%; max-width:420px;}
  .cv-q label{font-size:14px; color:#9A4E72; font-weight:600;}
  .cv-q input{width:100%; padding:12px 14px; border:1px solid #EAD3DE; border-radius:12px; font-size:15px; margin:7px 0 16px; background:#fff; color:#2E2A25; font-family:inherit;}
  .cv-start{margin-top:4px; width:100%; max-width:420px; padding:15px; border:none; border-radius:14px; background:#D4537E; color:#fff; font-size:16px; font-weight:600; cursor:pointer; box-shadow:0 8px 20px rgba(212,83,126,.3); font-family:inherit;}
  #print{display:none;}
  @media print{
    body,.wrap{background:#fff;}
    #app,.overlay,.lightbox{display:none !important;}
    #print{display:block; padding:0;}
    .pday{page-break-inside:avoid; border-bottom:1px solid #ddd; padding:14px 0;}
    .pphotos img{width:120px; height:120px; object-fit:cover; margin:6px 6px 0 0; border-radius:8px;}
  }
</style>
</head>
<body>
<div class="wrap">
  <div id="cover">
    <div id="cv-lang"><button data-lang="en" class="on">EN</button><button data-lang="mr">म</button><button data-lang="hi">हि</button></div>
    <span class="cv-deco" style="top:64px;left:22px;">🌸</span>
    <span class="cv-deco" style="top:110px;right:28px;">💕</span>
    <span class="cv-deco" style="top:340px;left:16px;">🍼</span>
    <span class="cv-deco" style="bottom:150px;right:22px;">⭐</span>
    <span class="cv-deco" style="bottom:70px;left:26px;">🦋</span>
    <div class="cv-scene" aria-hidden="true">
      <svg viewBox="0 0 230 112" width="230" height="112" xmlns="http://www.w3.org/2000/svg">
        <g class="sway">
          <path d="M0 98 Q72 88 152 70" stroke="#A97450" stroke-width="5" fill="none" stroke-linecap="round"/>
          <g transform="translate(44,91) rotate(-52) scale(0.8)"><path d="M0 0 Q9 -7 18 0 Q9 7 0 0 Z" fill="#86CBA3"/><path d="M2 0 L15 0" stroke="#3F7A58" stroke-width="0.9" fill="none" opacity=".5"/></g>
          <g transform="translate(70,86) rotate(-20)"><path d="M0 0 Q9 -7 18 0 Q9 7 0 0 Z" fill="#6FBE93"/><path d="M2 0 L15 0" stroke="#3F7A58" stroke-width="0.9" fill="none" opacity=".5"/></g>
          <g transform="translate(72,87) rotate(46) scale(0.72)"><path d="M0 0 Q9 -7 18 0 Q9 7 0 0 Z" fill="#7CC49B"/><path d="M2 0 L15 0" stroke="#3F7A58" stroke-width="0.9" fill="none" opacity=".5"/></g>
          <g transform="translate(100,80) rotate(-32) scale(0.92)"><path d="M0 0 Q9 -7 18 0 Q9 7 0 0 Z" fill="#6FBE93"/><path d="M2 0 L15 0" stroke="#3F7A58" stroke-width="0.9" fill="none" opacity=".5"/></g>
          <g transform="translate(122,75) rotate(-14) scale(0.82)"><path d="M0 0 Q9 -7 18 0 Q9 7 0 0 Z" fill="#86CBA3"/><path d="M2 0 L15 0" stroke="#3F7A58" stroke-width="0.9" fill="none" opacity=".5"/></g>
          <g transform="translate(120,77) rotate(40) scale(0.62)"><path d="M0 0 Q9 -7 18 0 Q9 7 0 0 Z" fill="#7CC49B"/><path d="M2 0 L15 0" stroke="#3F7A58" stroke-width="0.9" fill="none" opacity=".5"/></g>
          <g class="bird">
            <path d="M138 60 L127 55 L137 65 Z" fill="#CE6F8A"/>
            <ellipse cx="150" cy="61" rx="13" ry="10" fill="#E2899F"/>
            <path d="M141 58 Q147 67 154 60 Z" fill="#D4748C"/>
            <circle cx="162" cy="53" r="8" fill="#EFA0B4"/>
            <polygon points="170,52 179,54 170,57" fill="#E8A23C"/>
            <circle cx="164" cy="51" r="1.7" fill="#3a2a30"/>
          </g>
        </g>
        <g>
          <text x="175" y="44" class="note n1" font-size="12" fill="#B85C82">♪</text>
          <text x="184" y="40" class="note n2" font-size="10" fill="#B85C82">♫</text>
        </g>
      </svg>
    </div>
    <h1 class="cv-title" id="cv-title">My Pregnancy Journal</h1>
    <div class="cv-photo" id="cv-photo"><span class="cv-plus">＋</span><button class="cv-rm" id="cv-rm" style="display:none;">✕</button></div>
    <div class="cv-addcap" id="cv-addcap"></div>
    <div class="cv-msg" id="cv-msg"></div>
    <div class="cv-q"><label id="cv-askMum"></label><input id="cv-mum" type="text" /></div>
    <div class="cv-q"><label id="cv-askDad"></label><input id="cv-dad" type="text" /></div>
    <button class="cv-start" id="cv-start"></button>
    <p class="cv-credit"><a href="https://www.linkedin.com/in/joy9887" target="_blank" rel="noopener">Created by Joy James Nicolas</a></p>
    <input id="coverPhotoInput" type="file" accept="image/*" style="display:none;" />
  </div>
  <div id="app">
    <header>
      <div class="brandrow">
        <div class="logo">🌱</div>
        <div class="brand">
          <h1 id="t-app">Pihu</h1>
          <p id="t-tag">your pregnancy journal</p>
        </div>
        <div class="langsel">
          <button id="themeBtn" style="font-size:15px;">🌙</button>
          <button data-lang="en" class="on">EN</button>
          <button data-lang="mr">म</button>
          <button data-lang="hi">हि</button>
        </div>
      </div>
      <div class="names">
        <input id="momName" type="text" />
        <input id="babyName" type="text" />
      </div>
      <div class="progwrap"><div class="progbar" id="prog"></div></div>
    </header>

    <main>
      <div class="dayhead">
        <span class="wk" id="wklabel"></span>
        <span class="pill" id="trilabel"></span>
        <span class="pill jumpbtn" id="daycount" style="margin-left:auto;"></span>
      </div>

      <div class="moodrow" id="moodrow"></div>

      <div class="card">
        <div class="chead"><span class="chip" style="background:var(--tealbg);">🧠</span><b id="t-science"></b></div>
        <p class="ctext" id="scienceText"></p>
      </div>

      <div class="card task" id="momCard">
        <div class="chead"><span class="chip" style="background:var(--pinkbg);">✍️</span><b id="t-mom"></b><span class="check">✓</span></div>
        <p class="ctext" id="momText"></p>
      </div>

      <div class="card task" id="dadCard">
        <div class="chead"><span class="chip" style="background:var(--purplebg);">🤝</span><b id="t-dad"></b><span class="check">✓</span></div>
        <p class="ctext" id="dadText"></p>
      </div>

      <div class="card">
        <div class="chead"><span class="chip" style="background:var(--amberbg);">📖</span><b id="t-reflect"></b></div>
        <p class="ctext" id="reflectPrompt"></p>
        <textarea id="reflectBox"></textarea>
      </div>

      <div class="card">
        <div class="chead"><span class="chip" style="background:var(--tealbg);">📷</span><b id="t-memory"></b></div>
        <div class="photos" id="photos"></div>
        <input id="photoInput" type="file" accept="image/*" style="display:none;" />
      </div>

      <div class="card">
        <div class="chead"><span class="chip" style="background:var(--purplebg);">🎤</span><b id="t-voice"></b></div>
        <div id="voiceArea"></div>
        <div class="vhint" id="t-recHint"></div>
      </div>

      <div class="card">
        <div class="chead"><span class="chip" style="background:var(--pinkbg);">🎨</span><b id="t-play"></b></div>
        <div class="board" id="board"><canvas id="doodle"></canvas></div>
        <div class="boardbar" id="boardbar"></div>
        <button class="stickbtn" id="stickBtn"></button>
        <input type="color" id="colorPick" value="#ff66aa" style="display:none;" />
      </div>
    </main>

    <nav>
      <button class="navb" id="prev">‹</button>
      <div class="dots" id="dots"></div>
      <button class="navb" id="next">›</button>
    </nav>

    <div class="tools">
      <button class="primary" id="pdfBtn"></button>
      <button id="backupBtn"></button>
      <button id="restoreBtn"></button>
      <button id="coverBtn"></button>
    </div>
    <p class="hint" id="t-hint"></p>
    <p class="credit"><a href="https://www.linkedin.com/in/joy9887" target="_blank" rel="noopener">Created by Joy James Nicolas</a></p>
    <input id="restoreInput" type="file" accept="application/json,.json" style="display:none;" />
  </div>

  <div class="overlay" id="jumpOverlay">
    <div class="sheet">
      <h3 id="jumpTitle">Jump to a day</h3>

  {week:5,science:{en:"Your baby's neural tube — the foundation of the brain and spinal cord — is forming this week. Rest, water and folate matter most now.",mr:"या आठवड्यात बाळाची न्यूरल ट्यूब — मेंदू व पाठीच्या कण्याचा पाया — तयार होत आहे. आता विश्रांती, पाणी व फोलेट सर्वात महत्त्वाचे.",hi:"इस सप्ताह आपके शिशु की न्यूरल ट्यूब — मस्तिष्क और रीढ़ की नींव — बन रही है। अभी आराम, पानी और फोलेट सबसे ज़रूरी हैं।"}},
  {week:6,science:{en:"A tiny heart begins to beat this week, and little arm and leg buds appear. Staying calm keeps your own heart steady too.",mr:"या आठवड्यात बाळाचे चिमुकले हृदय धडधडू लागते आणि हात-पायांचे अंकुर दिसतात. शांत राहिल्याने तुमचेही हृदय स्थिर राहते.",hi:"इस सप्ताह नन्हा दिल धड़कने लगता है और हाथ-पैर की कलियाँ बनती हैं। शांत रहने से आपका दिल भी स्थिर रहता है।"}},
  {week:7,science:{en:"The brain is growing astonishingly fast now, and the face is starting to form. Gentle days and good rest support this rapid growth.",mr:"आता मेंदू आश्चर्यकारक वेगाने वाढत आहे आणि चेहरा तयार होऊ लागला आहे. शांत दिवस व चांगली विश्रांती या वाढीला मदत करते.",hi:"अब मस्तिष्क बहुत तेज़ी से बढ़ रहा है और चेहरा बनना शुरू हो गया है। शांत दिन और अच्छा आराम इस विकास में मदद करते हैं।"}},
  {week:8,science:{en:"All the major organs have begun to form this week, and tiny fingers and toes are taking shape. Your baby is about the size of a raspberry.",mr:"या आठवड्यात सर्व महत्त्वाचे अवयव तयार होऊ लागले आहेत आणि चिमुकली बोटे आकार घेत आहेत. बाळ आता रास्पबेरीएवढे आहे.",hi:"इस सप्ताह सभी मुख्य अंग बनने लगे हैं और नन्ही उँगलियाँ आकार ले रही हैं। शिशु अब रसभरी के आकार का है।"}},
  {week:9,science:{en:"Your baby's essential organs are in place and tiny muscles are forming — the very first, too-soft-to-feel movements begin.",mr:"बाळाचे मुख्य अवयव जागेवर आले आहेत आणि चिमुकले स्नायू तयार होत आहेत — न जाणवणारी पहिली हालचाल सुरू होते.",hi:"शिशु के मुख्य अंग अपनी जगह पर हैं और नन्हे मांसपेशियाँ बन रही हैं — पहली, न महसूस होने वाली हलचल शुरू होती है।"}},
  {week:10,science:{en:"Vital organs are starting to work, and fingers and toes have separated. Your baby is now officially called a fetus.",mr:"महत्त्वाचे अवयव काम करू लागले आहेत आणि बोटे वेगळी झाली आहेत. बाळाला आता वैद्यकीय भाषेत 'गर्भ' म्हणतात.",hi:"महत्वपूर्ण अंग काम करने लगे हैं और उँगलियाँ अलग हो गई हैं। शिशु को अब 'भ्रूण' कहा जाता है।"}},
  {week:11,science:{en:"Your baby is moving and stretching now, though far too gently to feel. Tiny nails and tooth buds are forming.",mr:"बाळ आता हालचाल करत आहे व ताणत आहे, पण ते जाणवण्याइतपत नाही. चिमुकली नखे व दातांचे अंकुर तयार होत आहेत.",hi:"शिशु अब हिल-डुल रहा है और खिंचाव कर रहा है, पर महसूस होने जितना नहीं। नन्हे नाखून और दाँतों की कलियाँ बन रही हैं।"}},
  {week:12,science:{en:"The major building work is done — kidneys make urine, your baby can swallow, and reflexes are appearing. The first trimester is nearly complete.",mr:"मोठे काम पूर्ण होत आले — मूत्रपिंड लघवी बनवते, बाळ गिळू शकते आणि प्रतिक्षिप्त क्रिया दिसतात. पहिली तिमाही जवळजवळ संपली.",hi:"बड़ा निर्माण कार्य लगभग पूरा — गुर्दे मूत्र बनाते हैं, शिशु निगल सकता है और प्रतिवर्त बनने लगे हैं। पहली तिमाही लगभग पूरी।"}},
  {week:13,science:{en:"Fingerprints have formed this week and your baby can make tiny sucking motions. Bones are beginning to harden.",mr:"या आठवड्यात बोटांचे ठसे तयार झाले आहेत आणि बाळ चिमुकल्या चोखण्याच्या हालचाली करू शकते. हाडे घट्ट होऊ लागली आहेत.",hi:"इस सप्ताह उँगलियों के निशान बन गए हैं और शिशु नन्ही चूसने की हरकतें कर सकता है। हड्डियाँ सख़्त होने लगी हैं।"}},
  {week:14,science:{en:"The structures for hearing are developing now, and your baby can bring a hand to its mouth and turn its head. Soft fine hair appears.",mr:"आता ऐकण्याची रचना विकसित होत आहे आणि बाळ हात तोंडाकडे नेऊ शकते व मान वळवू शकते. मऊ बारीक केस येतात.",hi:"अब सुनने की संरचनाएँ विकसित हो रही हैं और शिशु हाथ मुँह तक ले जा सकता है व सिर घुमा सकता है। मुलायम महीन बाल आते हैं।"}},
  {week:15,science:{en:"Bones are strengthening and your baby can sense bright light, even with eyes still closed. The ears are settling into place.",mr:"हाडे मजबूत होत आहेत आणि डोळे बंद असूनही बाळाला तेजस्वी प्रकाश जाणवतो. कान त्यांच्या जागी स्थिरावत आहेत.",hi:"हड्डियाँ मज़बूत हो रही हैं और आँखें बंद होने पर भी शिशु तेज़ रोशनी महसूस कर सकता है। कान अपनी जगह पर आ रहे हैं।"}},
  {week:16,science:{en:"Your baby's movements are becoming coordinated — rolling and flipping — and facial muscles can now squint and frown.",mr:"बाळाच्या हालचाली आता सुसंगत होत आहेत — लोळणे व पलटणे — आणि चेहऱ्याचे स्नायू आता हालचाल करू शकतात.",hi:"शिशु की हरकतें अब समन्वित हो रही हैं — लुढ़कना और पलटना — और चेहरे की मांसपेशियाँ अब हिल सकती हैं।"}},
  {week:17,science:{en:"Your baby begins laying down fat for warmth, and the soft skeleton is hardening from cartilage into bone.",mr:"बाळ उबेसाठी चरबी साठवू लागते आणि मऊ सांगाडा कूर्चापासून हाडात रूपांतरित होत आहे.",hi:"शिशु गर्माहट के लिए वसा जमा करने लगता है और मुलायम ढाँचा उपास्थि से हड्डी में बदल रहा है।"}},
  {week:18,science:{en:"A milestone week — your baby can hear now. Your voice, your heartbeat and gentle music are becoming familiar sounds.",mr:"एक महत्त्वाचा आठवडा — बाळ आता ऐकू शकते. तुमचा आवाज, हृदयाचे ठोके व मृदू संगीत आता ओळखीचे होत आहेत.",hi:"एक मील का पत्थर सप्ताह — शिशु अब सुन सकता है। आपकी आवाज़, दिल की धड़कन और कोमल संगीत अब जाने-पहचाने हो रहे हैं।"}},
  {week:19,science:{en:"A protective waxy coating called vernix covers your baby's skin, and the brain's sensory areas — hearing, taste, smell — are developing fast.",mr:"व्हर्निक्स नावाचे संरक्षक मेणासारखे आवरण बाळाच्या त्वचेवर येते आणि मेंदूचे संवेदी भाग — श्रवण, चव, वास — झपाट्याने विकसित होतात.",hi:"वर्निक्स नामक सुरक्षात्मक मोमी परत शिशु की त्वचा को ढकती है और मस्तिष्क के संवेदी क्षेत्र — सुनना, स्वाद, गंध — तेज़ी से विकसित होते हैं।"}},
  {week:20,science:{en:"You're halfway there. Around now many mothers feel the first flutters of movement as your baby grows stronger.",mr:"तुम्ही अर्ध्यावर पोहोचलात. याच सुमारास अनेक आईंना बाळाची पहिली हालचाल जाणवते, कारण बाळ अधिक बळकट होत आहे.",hi:"आप आधे रास्ते पर हैं। इसी समय कई माँओं को शिशु की पहली हलचल महसूस होती है, क्योंकि शिशु मज़बूत हो रहा है।"}},
  {week:21,science:{en:"Your baby's movements are getting stronger and taste buds are forming — your baby can even taste the flavours of what you eat.",mr:"बाळाच्या हालचाली बळकट होत आहेत आणि चव-कळ्या तयार होत आहेत — तुम्ही जे खाता त्याची चवही बाळाला जाणवते.",hi:"शिशु की हरकतें मज़बूत हो रही हैं और स्वाद-कलिकाएँ बन रही हैं — आप जो खाते हैं उसका स्वाद भी शिशु महसूस करता है।"}},
  {week:22,science:{en:"Senses are sharpening this week; your baby can sense light and dark, and lips, eyebrows and a tiny grip are becoming defined.",mr:"या आठवड्यात संवेदना तीक्ष्ण होत आहेत; बाळाला प्रकाश-अंधार जाणवतो आणि ओठ, भुवया व चिमुकली पकड स्पष्ट होत आहे.",hi:"इस सप्ताह इंद्रियाँ तेज़ हो रही हैं; शिशु को रोशनी-अँधेरा महसूस होता है और होंठ, भौंहें व नन्ही पकड़ स्पष्ट हो रही है।"}},
  {week:23,science:{en:"Your baby's hearing is well tuned to your voice now, and the lungs are busy building the blood vessels they'll need to breathe.",mr:"बाळाचे श्रवण आता तुमच्या आवाजाशी जुळले आहे आणि फुफ्फुसे श्वासासाठी लागणाऱ्या रक्तवाहिन्या तयार करत आहेत.",hi:"शिशु की सुनने की क्षमता अब आपकी आवाज़ से जुड़ गई है और फेफड़े साँस के लिए ज़रूरी रक्त-वाहिकाएँ बना रहे हैं।"}},
  {week:24,science:{en:"Your baby's inner ear, which controls balance, is developed — your baby can now sense whether it is upside down. The face is fully formed.",mr:"बाळाचे आतील कान, जे संतुलन सांभाळतात, विकसित झाले आहेत — बाळाला आता उलटे आहे का हे जाणवते. चेहरा पूर्ण तयार झाला आहे.",hi:"शिशु का भीतरी कान, जो संतुलन संभालता है, विकसित हो गया है — शिशु अब महसूस कर सकता है कि वह उल्टा है। चेहरा पूरी तरह बन गया है।"}},
  {week:25,science:{en:"Your baby responds to your voice and to sounds now, often with a little movement. Hands are fully formed and fat is filling out.",mr:"बाळ आता तुमच्या आवाजाला व ध्वनींना प्रतिसाद देते, अनेकदा छोट्या हालचालीने. हात पूर्ण तयार झाले आहेत व चरबी भरत आहे.",hi:"शिशु अब आपकी आवाज़ और ध्वनियों पर प्रतिक्रिया देता है, अक्सर हल्की हलचल से। हाथ पूरी तरह बन गए हैं और वसा भर रही है।"}},
  {week:26,science:{en:"Your baby's eyes begin to open this week, and brain activity for hearing and sight is switching on.",mr:"या आठवड्यात बाळाचे डोळे उघडू लागतात आणि श्रवण व दृष्टीसाठीची मेंदूची क्रिया सुरू होते.",hi:"इस सप्ताह शिशु की आँखें खुलने लगती हैं और सुनने व देखने के लिए मस्तिष्क की गतिविधि शुरू होती है।"}},
  {week:27,science:{en:"The second trimester ends with your baby sleeping and waking in patterns, blinking, and a very busy, growing brain.",mr:"दुसरी तिमाही संपते — बाळ ठरलेल्या वेळी झोपते-जागते, पापण्या मिचकावते आणि मेंदू झपाट्याने वाढत असतो.",hi:"दूसरी तिमाही समाप्त होती है — शिशु एक लय में सोता-जागता है, पलकें झपकाता है और मस्तिष्क तेज़ी से बढ़ रहा है।"}},
  {week:28,science:{en:"The third trimester begins. Your baby can open its eyes and dream, and may start settling into a head-down position.",mr:"तिसरी तिमाही सुरू होते. बाळ डोळे उघडू शकते व स्वप्ने पाहते आणि डोके खाली अशी स्थिती घेऊ लागते.",hi:"तीसरी तिमाही शुरू होती है। शिशु आँखें खोल सकता है और सपने देखता है, और सिर नीचे की स्थिति लेने लगता है।"}},
  {week:29,science:{en:"Your baby's bones are fully formed but still soft, and movements are strong and frequent now. Muscles and lungs keep maturing.",mr:"बाळाची हाडे पूर्ण तयार पण अजून मऊ आहेत आणि हालचाली आता बळकट व वारंवार आहेत. स्नायू व फुफ्फुसे परिपक्व होत आहेत.",hi:"शिशु की हड्डियाँ पूरी तरह बन गई हैं पर अभी मुलायम हैं और हरकतें अब मज़बूत व बार-बार हैं। मांसपेशियाँ व फेफड़े परिपक्व हो रहे हैं।"}},
  {week:30,science:{en:"Your baby's brain is growing rapidly and developing its folds, and a fine head of hair may be appearing.",mr:"बाळाचा मेंदू झपाट्याने वाढत आहे व त्यावर घड्या तयार होत आहेत आणि डोक्यावर मऊ केस येऊ लागले आहेत.",hi:"शिशु का मस्तिष्क तेज़ी से बढ़ रहा है और उस पर सिलवटें बन रही हैं, और सिर पर महीन बाल आने लगे हैं।"}},
  {week:31,science:{en:"All five senses are working now, and your baby's brain is making fast connections. Steady weight gain continues.",mr:"आता पाचही संवेदना कार्यरत आहेत आणि बाळाचा मेंदू वेगाने जोडण्या तयार करत आहे. वजन सातत्याने वाढत आहे.",hi:"अब पाँचों इंद्रियाँ काम कर रही हैं और शिशु का मस्तिष्क तेज़ी से संबंध बना रहा है। वज़न लगातार बढ़ रहा है।"}},
  {week:32,science:{en:"Your baby is practising breathing movements, tiny toenails have formed, and the soft downy hair begins to shed.",mr:"बाळ श्वासाच्या हालचालींचा सराव करत आहे, पायांची चिमुकली नखे तयार झाली आहेत आणि मऊ लव गळू लागली आहे.",hi:"शिशु साँस की हरकतों का अभ्यास कर रहा है, पैरों के नन्हे नाखून बन गए हैं और मुलायम रोएँ झड़ने लगे हैं।"}},
  {week:33,science:{en:"Your baby's skull bones stay soft and unfused — ready for birth — and your baby can now sense light through your belly.",mr:"बाळाच्या कवटीची हाडे मऊ व जुळलेली नसतात — जन्मासाठी तयार — आणि बाळाला आता पोटातून प्रकाश जाणवतो.",hi:"शिशु की खोपड़ी की हड्डियाँ मुलायम और बिना जुड़ी रहती हैं — जन्म के लिए तैयार — और शिशु अब पेट से रोशनी महसूस कर सकता है।"}},
  {week:34,science:{en:"Your baby's lungs are nearly mature and the nervous system is fine-tuning. Soft fat is filling out those little cheeks.",mr:"बाळाची फुफ्फुसे जवळजवळ परिपक्व आहेत व मज्जासंस्था अचूक होत आहे. मऊ चरबी त्या चिमुकल्या गालांत भरत आहे.",hi:"शिशु के फेफड़े लगभग परिपक्व हैं और तंत्रिका तंत्र संवर रहा है। मुलायम वसा उन नन्हे गालों को भर रही है।"}},
  {week:35,science:{en:"Your baby is gaining weight quickly now; the kidneys are fully developed and most internal systems are ready for the world.",mr:"बाळाचे वजन आता झपाट्याने वाढत आहे; मूत्रपिंड पूर्ण विकसित आहेत आणि बहुतेक अंतर्गत यंत्रणा जगासाठी तयार आहेत.",hi:"शिशु का वज़न अब तेज़ी से बढ़ रहा है; गुर्दे पूरी तरह विकसित हैं और अधिकांश आंतरिक तंत्र दुनिया के लिए तैयार हैं।"}},
  {week:36,science:{en:"Most babies are head-down by now, getting into position. The skin is smooth and your baby is plump and ready.",mr:"बहुतेक बाळे आता डोके खाली स्थितीत येतात. त्वचा गुळगुळीत झाली आहे आणि बाळ गुटगुटीत व तयार आहे.",hi:"अधिकांश शिशु अब सिर नीचे की स्थिति में आ जाते हैं। त्वचा चिकनी है और शिशु गोल-मटोल व तैयार है।"}},
  {week:37,science:{en:"Your baby is 'early term' this week — practising breathing, sucking and gripping, with lungs almost fully mature.",mr:"या आठवड्यात बाळ 'अर्ली टर्म' आहे — श्वास, चोखणे व पकडण्याचा सराव करत आहे आणि फुफ्फुसे जवळजवळ पूर्ण परिपक्व आहेत.",hi:"इस सप्ताह शिशु 'अर्ली टर्म' है — साँस, चूसने और पकड़ने का अभ्यास कर रहा है और फेफड़े लगभग पूरी तरह परिपक्व हैं।"}},
  {week:38,science:{en:"Your baby's organs are ready to work on their own, the grasp is firm, and the brain and lungs keep maturing.",mr:"बाळाचे अवयव स्वतः काम करण्यास तयार आहेत, पकड घट्ट आहे आणि मेंदू व फुफ्फुसे परिपक्व होत आहेत.",hi:"शिशु के अंग स्वयं काम करने के लिए तैयार हैं, पकड़ मज़बूत है और मस्तिष्क व फेफड़े परिपक्व हो रहे हैं।"}},
  {week:39,science:{en:"Full term. Your baby is ready to meet you, building a little more fat to stay warm after birth.",mr:"पूर्ण कालावधी. बाळ तुम्हाला भेटायला तयार आहे, जन्मानंतर ऊब टिकवण्यासाठी थोडी अधिक चरबी साठवत आहे.",hi:"पूर्ण अवधि। शिशु आपसे मिलने के लिए तैयार है, जन्म के बाद गर्म रहने के लिए थोड़ी और वसा बना रहा है।"}},
  {week:40,science:{en:"Your due date is here. Your baby is fully developed and ready — and that amazing brain will keep growing for years to come.",mr:"तुमची नियत तारीख आली आहे. बाळ पूर्ण विकसित व तयार आहे — आणि तो अद्भुत मेंदू पुढे अनेक वर्षे वाढत राहील.",hi:"आपकी नियत तारीख़ आ गई है। शिशु पूरी तरह विकसित व तैयार है — और वह अद्भुत मस्तिष्क आगे वर्षों तक बढ़ता रहेगा।"}}
];

    {en:"Drink an extra glass of water and rest whenever your body asks you to.",mr:"एक ग्लास जास्त पाणी प्या आणि शरीर सांगेल तेव्हा विश्रांती घ्या.",hi:"एक गिलास अतिरिक्त पानी पिएँ और जब शरीर कहे तब आराम करें।"},

/* ---------- tiny IndexedDB store (no library) ---------- */
var DB;
function openDB(){
  return new Promise(function(res){
    var r = indexedDB.open("nurtura", 1);
    r.onupgradeneeded = function(e){ e.target.result.createObjectStore("kv"); };
    r.onsuccess = function(e){ DB = e.target.result; res(); };
    r.onerror = function(){ res(); };
  });
}
function dbGet(k){ return new Promise(function(res){ try{ var t=DB.transaction("kv","readonly").objectStore("kv").get(k); t.onsuccess=function(){res(t.result);}; t.onerror=function(){res(null);}; }catch(e){res(null);} }); }
function dbSet(k,v){ return new Promise(function(res){ try{ var t=DB.transaction("kv","readwrite").objectStore("kv").put(v,k); t.onsuccess=function(){res();}; t.onerror=function(){res();}; }catch(e){res();} }); }

/* ---------- voice message ---------- */
var mediaRec=null, recChunks=[], recTimer=null, recSecs=0, recStream=null, recDayIndex=0;
function fmtT(s){ var m=Math.floor(s/60), ss=s%60; return m+":"+(ss<10?"0":"")+ss; }
function renderVoice(){
  var u=UI[lang], area=document.getElementById("voiceArea"), ds=dayState(DAYS[cur].day);
  area.innerHTML="";
  if(mediaRec && mediaRec.state==="recording" && recDayIndex===cur){
    var stop=document.createElement("button"); stop.className="vbtn rec"; stop.id="recBtn"; stop.textContent=u.stop+" ("+fmtT(recSecs)+")"; stop.onclick=stopRec;
    area.appendChild(stop); return;
  }
  if(ds.audio){
    var au=document.createElement("audio"); au.controls=true; au.src=ds.audio; area.appendChild(au);
    var del=document.createElement("button"); del.className="vbtn del"; del.textContent="🗑 "+u.del; del.onclick=function(){ dayState(DAYS[cur].day).audio=null; save(); renderVoice(); };
    area.appendChild(del);
  } else {
    var rec=document.createElement("button"); rec.className="vbtn rec"; rec.textContent=u.rec; rec.onclick=startRec;
    area.appendChild(rec);
  }
}
function pickMime(){ var o=["audio/webm;codecs=opus","audio/webm","audio/mp4","audio/aac","audio/ogg"]; for(var i=0;i<o.length;i++){ try{ if(window.MediaRecorder&&MediaRecorder.isTypeSupported&&MediaRecorder.isTypeSupported(o[i])) return o[i]; }catch(e){} } return ""; }
function startRec(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia||!window.MediaRecorder){ alert(UI[lang].noMic); return; }
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    recStream=stream; recChunks=[]; recDayIndex=cur; var mime=pickMime();
    try{ mediaRec=mime?new MediaRecorder(stream,{mimeType:mime}):new MediaRecorder(stream); }catch(e){ mediaRec=new MediaRecorder(stream); }
    mediaRec.ondataavailable=function(ev){ if(ev.data&&ev.data.size) recChunks.push(ev.data); };
    mediaRec.onstop=function(){
      if(recTimer){ clearInterval(recTimer); recTimer=null; }
      var blob=new Blob(recChunks,{type:(mediaRec&&mediaRec.mimeType)||"audio/webm"});
      var fr=new FileReader(); fr.onload=function(){ dayState(DAYS[recDayIndex].day).audio=fr.result; save(); renderVoice(); }; fr.readAsDataURL(blob);
      if(recStream){ recStream.getTracks().forEach(function(t){ t.stop(); }); recStream=null; }
    };
    recSecs=0; mediaRec.start();
    recTimer=setInterval(function(){ recSecs++; var b=document.getElementById("recBtn"); if(b) b.textContent=UI[lang].stop+" ("+fmtT(recSecs)+")"; if(recSecs>=120) stopRec(); },1000);
    renderVoice();
  }).catch(function(){ alert(UI[lang].noMic); });
}
function stopRec(){ try{ if(mediaRec && mediaRec.state==="recording") mediaRec.stop(); }catch(e){} }

function openJump(){

  var weeks={};
  DAYS.forEach(function(d,i){ (weeks[d.week]=weeks[d.week]||[]).push({i:i,d:d}); });
  Object.keys(weeks).sort(function(a,b){ return a-b; }).forEach(function(wk){
    var g=document.createElement("div"); g.className="wkgrp";
    g.innerHTML='<div class="wl">'+u.week+" "+wk+'</div>';
    var chips=document.createElement("div"); chips.className="daychips";
    weeks[wk].forEach(function(o){
      var c=document.createElement("div"); c.className="daychip"+(o.i===cur?" cur":"");
      c.textContent=u.day+" "+o.d.day;
      c.onclick=function(){ goToDay(o.i); closeJump(); };
      chips.appendChild(c);
    });
    g.appendChild(chips); body.appendChild(g);
  });
  document.getElementById("jumpOverlay").classList.add("open");
}
function closeJump(){ document.getElementById("jumpOverlay").classList.remove("open"); }
function goToDay(i){ stopRec(); cur=i; renderDay(); }

function sizeCanvas(){ var c=canvasEl(), b=boardEl(); var w=b.clientWidth||300, h=b.clientHeight||210; if(c.width!==w) c.width=w; if(c.height!==h) c.height=h; }
function clearCanvas(){ var c=canvasEl(); c.getContext("2d").clearRect(0,0,c.width,c.height); }
function loadDoodle(){ var ds=dayState(DAYS[cur].day), c=canvasEl(); clearCanvas(); if(ds.doodle){ var img=new Image(); img.onload=function(){ c.getContext("2d").drawImage(img,0,0,c.width,c.height); }; img.src=ds.doodle; } }
function saveDoodle(){ try{ dayState(DAYS[cur].day).doodle=canvasEl().toDataURL("image/png"); save(); }catch(e){} }
function canvasPos(e){ var c=canvasEl(), r=c.getBoundingClientRect(); return { x:(e.clientX-r.left)*(c.width/r.width), y:(e.clientY-r.top)*(c.height/r.height) }; }
function startDraw(e){ if(e.target!==canvasEl())return; drawing=true; var p=canvasPos(e); lastX=p.x; lastY=p.y; if(e.cancelable)e.preventDefault(); }
function moveDraw(e){ if(!drawing)return; var p=canvasPos(e), ctx=canvasEl().getContext("2d"); ctx.strokeStyle=penColor; ctx.lineWidth=penWidth; ctx.lineCap="round"; ctx.lineJoin="round"; ctx.beginPath(); ctx.moveTo(lastX,lastY); ctx.lineTo(p.x,p.y); ctx.stroke(); lastX=p.x; lastY=p.y; if(e.cancelable)e.preventDefault(); }
function endDraw(){ if(drawing){ drawing=false; saveDoodle(); } }
function buildBoardBar(){
  var bar=document.getElementById("boardbar"); bar.innerHTML="";
  COLORS.forEach(function(col){ var s=document.createElement("div"); s.className="swatch"+(col===penColor?" sel":""); s.style.background=col; s.onclick=function(){ penColor=col; buildBoardBar(); }; bar.appendChild(s); });
  var rb=document.createElement("label"); rb.className="rainbow"+(COLORS.indexOf(penColor)<0?" sel":""); rb.style.position="relative"; rb.style.overflow="hidden"; rb.style.display="inline-block";
  var ci=document.createElement("input"); ci.type="color"; ci.value=(COLORS.indexOf(penColor)<0?penColor:"#ff66aa");
  ci.style.cssText="position:absolute;left:-20%;top:-20%;width:140%;height:140%;opacity:0;border:none;padding:0;margin:0;cursor:pointer;";
  ci.oninput=function(){ penColor=ci.value; };
  ci.onchange=function(){ penColor=ci.value; buildBoardBar(); };
  rb.appendChild(ci);
  bar.appendChild(rb);
  var sep=document.createElement("div"); sep.className="pensep"; bar.appendChild(sep);
  PEN_SIZES.forEach(function(sz){ var p=document.createElement("div"); p.className="pensize"+(sz===penWidth?" sel":""); var dot=document.createElement("i"); var dd=Math.round(sz*1.6)+4; dot.style.width=dd+"px"; dot.style.height=dd+"px"; p.appendChild(dot); p.onclick=function(){ penWidth=sz; buildBoardBar(); }; bar.appendChild(p); });
  var clr=document.createElement("button"); clr.className="clearbtn"; clr.textContent=UI[lang].clear;
  clr.onclick=function(){ var ds=dayState(DAYS[cur].day); ds.doodle=null; clearCanvas(); save(); };
  bar.appendChild(clr);
}
function renderStickers(){
  var b=boardEl();
  Array.prototype.slice.call(b.querySelectorAll(".sticker")).forEach(function(n){ n.parentNode.removeChild(n); });
  var ds=dayState(DAYS[cur].day);
  (ds.stickers||[]).forEach(function(st,idx){
    var el=document.createElement("div"); el.className="sticker"; el.textContent=st.e;
    el.style.left=st.x+"%"; el.style.top=st.y+"%";
    var x=document.createElement("button"); x.className="sx"; x.textContent="x";
    x.onclick=function(ev){ ev.stopPropagation(); ds.stickers.splice(idx,1); save(); renderStickers(); };
    el.appendChild(x);
    dragSticker(el, st);
    b.appendChild(el);
  });
}
function addSticker(em){ var ds=dayState(DAYS[cur].day); ds.stickers=ds.stickers||[]; ds.stickers.push({e:em, x:50, y:45}); save(); renderStickers(); }
function dragSticker(el, st){
  el.addEventListener("pointerdown", function(ev){
    if(ev.target.classList.contains("sx"))return;
    ev.stopPropagation(); if(ev.cancelable)ev.preventDefault();
    var b=boardEl();
    function mv(e2){ var r=b.getBoundingClientRect(); var nx=Math.max(2,Math.min(98,(e2.clientX-r.left)/r.width*100)); var ny=Math.max(2,Math.min(98,(e2.clientY-r.top)/r.height*100)); st.x=Math.round(nx); st.y=Math.round(ny); el.style.left=st.x+"%"; el.style.top=st.y+"%"; }
    function up(){ document.removeEventListener("pointermove",mv); document.removeEventListener("pointerup",up); save(); }
    document.addEventListener("pointermove",mv); document.addEventListener("pointerup",up);
  });
}
function buildStickerPopup(){
  var u=UI[lang], body=document.getElementById("stickBody"); body.innerHTML="";
  document.getElementById("stickTitle").textContent=u.stickers;
  STICKER_CATS.forEach(function(cat){
    var lab=document.createElement("div"); lab.className="catlabel"; lab.textContent=(u.cats&&u.cats[cat.key])||cat.key; body.appendChild(lab);
    var g=document.createElement("div"); g.className="stickgrid";
    cat.e.forEach(function(em){ var o=document.createElement("div"); o.className="sopt"; o.textContent=em; o.onclick=function(){ addSticker(em); closeSticker(); }; g.appendChild(o); });
    body.appendChild(g);
  });
}
function openSticker(){ buildStickerPopup(); document.getElementById("stickerOverlay").classList.add("open"); }
function closeSticker(){ document.getElementById("stickerOverlay").classList.remove("open"); }

/* ---------- image compression ---------- */
function compress(file, cb){
  var img=new Image(), url=URL.createObjectURL(file);
  img.onload=function(){
    var max=900, w=img.width, h=img.height;
    if(w>h && w>max){ h=Math.round(h*max/w); w=max; } else if(h>max){ w=Math.round(w*max/h); h=max; }
    var c=document.createElement("canvas"); c.width=w; c.height=h;
    c.getContext("2d").drawImage(img,0,0,w,h);
    URL.revokeObjectURL(url);
    cb(c.toDataURL("image/jpeg",0.7));
  };
  img.src=url;
}

/* ---------- PDF keepsake (browser print) ---------- */
function compositeBoard(ds){
  return new Promise(function(res){
    var w=300, h=210, c=document.createElement("canvas"); c.width=w; c.height=h; var ctx=c.getContext("2d");
    ctx.fillStyle="#FFFDF9"; ctx.fillRect(0,0,w,h);
    function stickers(){ ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.font="26px sans-serif"; (ds.stickers||[]).forEach(function(st){ try{ ctx.fillText(st.e, st.x/100*w, st.y/100*h); }catch(e){} }); res(c.toDataURL("image/jpeg",0.85)); }
    if(ds.doodle){ var img=new Image(); img.onload=function(){ ctx.drawImage(img,0,0,w,h); stickers(); }; img.onerror=stickers; img.src=ds.doodle; } else stickers();
  });
}
function buildPrint(){
  var u=UI[lang];
  var tasks=DAYS.map(function(d){
    var ds=state.days[d.day]; if(!ds) return Promise.resolve("");
    var hasBoard=ds.doodle||(ds.stickers&&ds.stickers.length);
    var any=ds.reflect||ds.mood!==null||(ds.photos&&ds.photos.length)||hasBoard||ds.audio;
    if(!any) return Promise.resolve("");
    var html='<div class="pday"><div style="font-weight:600;">'+u.week+' '+d.week+' - '+u.day+' '+d.day+'</div>';
    if(ds.mood!==null) html+='<div style="margin-top:4px;">'+["😄","🙂","😐","😟","😢"][ds.mood]+' '+u.moods[ds.mood]+'</div>';
    html+='<div style="margin-top:6px;color:#444;">'+d.science[lang]+'</div>';
    if(ds.reflect) html+='<div style="margin-top:6px;"><b>'+u.reflect+':</b> '+escapeHtml(ds.reflect)+'</div>';
    if(ds.audio) html+='<div style="margin-top:6px;color:#777;">🎤 '+u.voice+'</div>';
    if(ds.photos&&ds.photos.length){ html+='<div class="pphotos">'; ds.photos.forEach(function(s){ html+='<img src="'+s+'"/>'; }); html+='</div>'; }
    if(hasBoard){ return compositeBoard(ds).then(function(durl){ return html+'<div style="margin-top:8px;"><img src="'+durl+'" style="width:300px;border:1px solid #ddd;border-radius:8px;"/></div></div>'; }); }
    return Promise.resolve(html+'</div>');
  });
  return Promise.all(tasks).then(function(parts){
    var s=state.settings, who=[];
    if(s.momName) who.push(escapeHtml(s.momName));
    if(s.dadName) who.push(escapeHtml(s.dadName));
    var head='<div style="text-align:center;padding:50px 0 40px;">';
    head+='<div style="font-size:30px;font-weight:600;color:#B83C66;margin-bottom:18px;">'+u.coverTitle+'</div>';
    if(s.coverPhoto) head+='<img src="'+s.coverPhoto+'" style="width:150px;height:150px;border-radius:50%;object-fit:cover;border:4px solid #D4537E;"><br>';
    head+='<div style="font-size:24px;font-weight:600;margin-top:16px;">'+(escapeHtml(s.babyName)||"Our Baby")+'</div>';
    if(who.length) head+='<div style="color:#7A736B;margin-top:4px;">'+who.join(" & ")+'</div>';
    head+='<div style="color:#9A8E94;margin-top:8px;font-size:13px;">'+u.tag+'</div>';
    head+='</div><div style="page-break-after:always;"></div>';
    document.getElementById("print").innerHTML=head+parts.join("");
  });
}
function escapeHtml(s){ return (s||"").replace(/[&<>]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;"}[c];}); }

/* ---------- backup / restore ---------- */
function backup(){
  var blob=new Blob([JSON.stringify(state)],{type:"application/json"});
  var a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="pihu-backup-"+new Date().toISOString().slice(0,10)+".json"; a.click();
}
function restore(file){
  var r=new FileReader();
  r.onload=function(){ try{ var d=JSON.parse(r.result); if(d&&d.days){ state=d; lang=(state.settings&&state.settings.lang)||"en"; dbSet("state",state); initInputs(); applyUI(); syncLangButtons(); applyTheme(); renderDay(); } }catch(e){ alert("Could not read that backup file."); } };
  r.readAsText(file);
}

/* ---------- cover / onboarding ---------- */
function showCover(){ document.getElementById("app").style.display="none"; document.getElementById("cover").style.display="flex"; renderCover(); }
function dayIndexFor(n){ for(var i=0;i<DAYS.length;i++){ if(DAYS[i].day===n) return i; } return 0; }
function showApp(){ document.getElementById("cover").style.display="none"; document.getElementById("app").style.display="block"; if(state.settings && state.settings.lastDay){ cur=dayIndexFor(state.settings.lastDay); } initInputs(); renderDay(); }
function renderCover(){
  var u=UI[lang], s=state.settings;
  setText("cv-title", u.coverTitle); setText("cv-addcap", u.coverCap); setText("cv-msg", u.babyMsg);
  setText("cv-askMum", u.askMum); setText("cv-askDad", u.askDad);
  var mum=document.getElementById("cv-mum"), dad=document.getElementById("cv-dad");
  mum.placeholder=u.mumPH; dad.placeholder=u.dadPH; mum.value=s.momName||""; dad.value=s.dadName||"";
  document.getElementById("cv-start").textContent=u.startBtn;
  var ph=document.getElementById("cv-photo"), plus=ph.querySelector(".cv-plus");
  var rm=document.getElementById("cv-rm");
  if(s.coverPhoto){ ph.style.backgroundImage="url("+s.coverPhoto+")"; ph.classList.add("has"); plus.style.display="none"; rm.style.display="block"; }
  else { ph.style.backgroundImage="none"; ph.classList.remove("has"); plus.style.display="block"; rm.style.display="none"; }
  var lb=document.querySelectorAll("#cv-lang button"); for(var i=0;i<lb.length;i++) lb[i].classList.toggle("on", lb[i].dataset.lang===lang);
}

/* ---------- wiring ---------- */
function syncLangButtons(){ var bs=document.querySelectorAll(".langsel button"); for(var i=0;i<bs.length;i++){ bs[i].classList.toggle("on", bs[i].dataset.lang===lang); } }
function initInputs(){
  document.getElementById("momName").value=(state.settings&&state.settings.momName)||"";
  document.getElementById("babyName").value=(state.settings&&state.settings.babyName)||"";
}
function applyTheme(){ var dark=(state.settings&&state.settings.theme==="dark"); document.body.classList.toggle("dark", dark); var b=document.getElementById("themeBtn"); if(b) b.textContent=dark?"☀️":"🌙"; }
function wire(){
  var cl=document.querySelectorAll("#cv-lang button");
  for(var j=0;j<cl.length;j++){ (function(b){ b.onclick=function(){ lang=b.dataset.lang; state.settings.lang=lang; save(); syncLangButtons(); applyUI(); renderCover(); }; })(cl[j]); }
  document.getElementById("cv-photo").onclick=function(){ document.getElementById("coverPhotoInput").click(); };
  document.getElementById("coverPhotoInput").onchange=function(){ var f=this.files[0]; if(!f)return; compress(f,function(src){ state.settings.coverPhoto=src; save(); renderCover(); }); this.value=""; };
  document.getElementById("cv-mum").oninput=function(){ state.settings.momName=this.value; save(); };
  document.getElementById("cv-dad").oninput=function(){ state.settings.dadName=this.value; save(); };
  document.getElementById("cv-start").onclick=function(){ state.settings.started=true; save(); showApp(); };
  document.getElementById("cv-rm").onclick=function(ev){ ev.stopPropagation(); state.settings.coverPhoto=null; save(); renderCover(); };
  document.getElementById("coverBtn").onclick=showCover;
  document.getElementById("themeBtn").onclick=function(){ state.settings.theme=(state.settings.theme==="dark"?"light":"dark"); save(); applyTheme(); };
  var bs=document.querySelectorAll(".langsel button");
  for(var i=0;i<bs.length;i++){ (function(b){ b.onclick=function(){ lang=b.dataset.lang; state.settings.lang=lang; save(); syncLangButtons(); applyUI(); renderDay(); }; })(bs[i]); }
  document.getElementById("momName").oninput=function(){ state.settings.momName=this.value; save(); };
  document.getElementById("babyName").oninput=function(){ state.settings.babyName=this.value; save(); };
  document.getElementById("momCard").onclick=function(e){ if(e.target.closest(".ctext"))return; var ds=dayState(DAYS[cur].day); ds.momDone=!ds.momDone; save(); renderDay(); };
  document.getElementById("dadCard").onclick=function(e){ if(e.target.closest(".ctext"))return; var ds=dayState(DAYS[cur].day); ds.dadDone=!ds.dadDone; save(); renderDay(); };
  document.getElementById("reflectBox").oninput=function(){ dayState(DAYS[cur].day).reflect=this.value; save(); };
  document.getElementById("prev").onclick=function(){ if(cur>0) goToDay(cur-1); };
  document.getElementById("next").onclick=function(){ if(cur<DAYS.length-1) goToDay(cur+1); };
  document.getElementById("daycount").onclick=openJump;
  document.getElementById("jumpClose").onclick=closeJump;
  document.getElementById("jumpOverlay").onclick=function(e){ if(e.target===this) closeJump(); };
  document.getElementById("stickBtn").onclick=openSticker;
  document.getElementById("stickClose").onclick=closeSticker;
  document.getElementById("stickerOverlay").onclick=function(e){ if(e.target===this) closeSticker(); };
  document.getElementById("colorPick").onchange=function(){ penColor=this.value; buildBoardBar(); };
  document.getElementById("lbClose").onclick=closeLightbox;
  document.getElementById("lightbox").onclick=function(e){ if(e.target===this) closeLightbox(); };
  document.getElementById("photoInput").onchange=function(){ var f=this.files[0]; if(!f)return; compress(f,function(src){ dayState(DAYS[cur].day).photos.push(src); save(); renderDay(); }); this.value=""; };
  document.getElementById("pdfBtn").onclick=function(){ buildPrint().then(function(){ setTimeout(function(){ window.print(); },80); }); };
  document.getElementById("backupBtn").onclick=backup;
  document.getElementById("restoreBtn").onclick=function(){ document.getElementById("restoreInput").click(); };
  document.getElementById("restoreInput").onchange=function(){ if(this.files[0]) restore(this.files[0]); this.value=""; };
  var cv=canvasEl();
  cv.addEventListener("pointerdown", startDraw);
  document.addEventListener("pointermove", moveDraw);
  document.addEventListener("pointerup", endDraw);
  window.addEventListener("resize", function(){ sizeCanvas(); loadDoodle(); });
}

(function start(){
  openDB().then(function(){ return dbGet("state"); }).then(function(saved){
    if(saved&&saved.days){ state=saved; lang=(state.settings&&state.settings.lang)||"en"; }
    if(!state.settings) state.settings={};
    wire(); syncLangButtons(); applyUI(); applyTheme();
    if(state.settings.started){ showApp(); } else { showCover(); }
  });
})();
</script>
